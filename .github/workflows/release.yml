name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binaries
        run: |
          cd target/${{ matrix.target }}/release
          for bin in tether tetherd tether-proxy; do
            cp $bin ../../../${bin}-${{ matrix.target }}
          done
      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash dist/build-deb.sh ${{ matrix.target }} "$VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: tether-${{ matrix.target }}
          path: |
            tether-${{ matrix.target }}
            tetherd-${{ matrix.target }}
            tether-proxy-${{ matrix.target }}
            tether_*.deb

  build-macos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild
      - name: Build client
        run: cargo zigbuild -p tether --release --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/tether tether-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: tether-${{ matrix.target }}
          path: tether-${{ matrix.target }}

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/tether-*/* \
            dist/tetherd@.service \
            dist/tetherd.user.service
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM=$(sha256sum artifacts/tether-aarch64-apple-darwin/tether-aarch64-apple-darwin | cut -d' ' -f1)
          SHA_X86=$(sha256sum artifacts/tether-x86_64-apple-darwin/tether-x86_64-apple-darwin | cut -d' ' -f1)

          cat > /tmp/tether.rb <<EOF
          class Tether < Formula
            desc "Persistent terminal sessions over SSH"
            homepage "https://github.com/hflsmax/tether"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/hflsmax/tether/releases/download/${GITHUB_REF_NAME}/tether-aarch64-apple-darwin"
                sha256 "$SHA_ARM"
              else
                url "https://github.com/hflsmax/tether/releases/download/${GITHUB_REF_NAME}/tether-x86_64-apple-darwin"
                sha256 "$SHA_X86"
              end
            end

            def install
              binary = Dir["tether-*"].first || "tether"
              bin.install binary => "tether"
            end

            test do
              assert_match "tether #{version}", shell_output("#{bin}/tether --version")
            end
          end
          EOF

          # Push updated formula
          git clone https://x-access-token:${GH_TOKEN}@github.com/hflsmax/homebrew-tether.git /tmp/homebrew-tether
          cp /tmp/tether.rb /tmp/homebrew-tether/Formula/tether.rb
          cd /tmp/homebrew-tether
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tether.rb
          git commit -m "Update tether to $VERSION"
          git push
