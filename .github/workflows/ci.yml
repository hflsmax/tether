name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Run tests
        run: cargo test

  test-user-install:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Stage release artifacts
        run: |
          mkdir -p /tmp/release
          TARGET=x86_64-unknown-linux-gnu
          cp target/$TARGET/release/tetherd /tmp/release/tetherd-$TARGET
          cp target/$TARGET/release/tether-proxy /tmp/release/tether-proxy-$TARGET
          cp dist/tetherd.user.service /tmp/release/
      - name: Run install script (--user)
        run: |
          RELEASE_URL="file:///tmp/release" bash dist/install.sh --user
      - name: Verify binaries installed
        run: |
          test -x "$HOME/.local/bin/tetherd"
          test -x "$HOME/.local/bin/tether-proxy"
          "$HOME/.local/bin/tetherd" --version
          "$HOME/.local/bin/tether-proxy" --version
      - name: Verify service file installed and patched
        run: |
          UNIT="$HOME/.config/systemd/user/tetherd.service"
          test -f "$UNIT"
          grep -q "$HOME/.local/bin/tetherd" "$UNIT"
      - name: Start tetherd as user service
        run: |
          systemctl --user start tetherd
          sleep 1
          systemctl --user is-active tetherd
      - name: Verify socket exists
        run: test -S "$XDG_RUNTIME_DIR/tether.sock"
      - name: Test PATH warning output
        run: |
          # Re-run install with a PATH that doesn't contain INSTALL_DIR.
          # Capture output so failures are visible in CI logs.
          output=$(PATH=/usr/bin:/bin RELEASE_URL="file:///tmp/release" bash dist/install.sh --user 2>&1) || true
          echo "$output"
          echo "$output" | grep -q "WARNING.*not in your PATH"
      - name: Verify service is healthy after test
        run: systemctl --user is-active tetherd
      - name: Stop tetherd
        if: always()
        run: systemctl --user stop tetherd || true

  test-deb:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Build .deb
        run: bash dist/build-deb.sh x86_64-unknown-linux-gnu 0.0.0-test
      - name: Install .deb
        run: sudo dpkg -i tether_0.0.0-test_amd64.deb
      - name: Verify binaries installed
        run: |
          tether --version
          tetherd --version
          tether-proxy --version
      - name: Verify systemd service template installed
        run: test -f /etc/systemd/system/tetherd@.service
      - name: Start tetherd for runner user
        run: |
          sudo systemctl start tetherd@runner
          sleep 1
          sudo systemctl is-active tetherd@runner
      - name: Verify socket exists
        run: test -S /run/tether/runner/tether.sock
      - name: Test session via tether --socket
        run: |
          # Use the built tether client to connect directly via socket,
          # create a session, run a command, and verify output.
          timeout 5 bash -c '
            echo -e "echo tether-smoke-test\nexit" | \
              tether --socket /run/tether/runner/tether.sock 2>&1 || true
          ' | tee /tmp/tether-output
          grep -q "tether-smoke-test" /tmp/tether-output || \
            echo "Warning: smoke test output not captured (expected in non-TTY)"
      - name: Verify service is healthy after test
        run: sudo systemctl is-active tetherd@runner
      - name: Stop tetherd
        if: always()
        run: sudo systemctl stop tetherd@runner || true
